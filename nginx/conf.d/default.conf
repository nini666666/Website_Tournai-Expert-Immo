server {
    listen 80;
    server_name _;
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    location /api/ {
        proxy_pass http://tei-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    if ($http_x_forwarded_proto != "https") {
        return 301 https://$host$request_uri;
    }
}
