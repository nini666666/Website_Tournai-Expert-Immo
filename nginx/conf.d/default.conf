server {
    listen 80;
    server_name _;

    if ($http_x_forwarded_proto != "https") {
        return 301 https://$host$request_uri;
    }

    # ── Frontend SPA ──────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Admin panel ───────────────────────────────────────────────
    location /admin/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /admin/index.html;

        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
    }

    # ── API (proxy vers le backend Node.js) ───────────────────────
    location /api/ {
        proxy_pass http://tei-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout généreux pour le webhook Mollie
        proxy_read_timeout 30s;
    }
}
